name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test & benchmark (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests
        run: pytest tests/ -q

      - name: Reproducible benchmark scorecard
        run: python -m benchmarks.measure

      - name: Rules doc is in sync
        run: python -m benchmarks.gen_rules_doc --check

      - name: Self-scan (built-in engine, offline)
        run: python tythanai_community_cli.py scan scanners --no-sca --no-secrets --quiet || true
